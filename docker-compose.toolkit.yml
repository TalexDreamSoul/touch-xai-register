# Optional toolkit stack: Nginx gateway + SMTP Console + mail-bridge
# Keeps the existing full stack (warp/privoxy/flaresolverr/panel) intact.
#
#   cp .env.example .env
#   cp config/smtp/.env.example config/smtp/.env   # fill FreeMail / SMTP
#   docker compose -f docker-compose.yml -f docker-compose.toolkit.yml up -d --build
#
# Entry:
#   http://localhost:${TOOLKIT_PORT:-8080}/panel/        → Grok panel
#   http://localhost:${TOOLKIT_PORT:-8080}/smtp/         → SMTP console
#   http://localhost:${TOOLKIT_PORT:-8080}/mail-bridge/  → custom EMAIL_API bridge
#
# Wire panel custom email to the bridge (compose network DNS):
#   EMAIL_MODE=custom
#   EMAIL_DOMAIN=your-catch-all.example.com
#   EMAIL_API=http://mail-bridge:18431

services:
  gateway:
    image: nginx:1.27-alpine
    container_name: grok-toolkit-gateway
    restart: unless-stopped
    ports:
      - "${TOOLKIT_PORT:-8080}:80"
    volumes:
      - ./docker/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      panel:
        condition: service_started
      smtp:
        condition: service_started
      mail-bridge:
        condition: service_started

  smtp:
    build:
      context: ./apps/smtp
    image: touch-xai-smtp:local
    container_name: grok-smtp
    restart: unless-stopped
    env_file:
      - ./config/smtp/.env
    volumes:
      - smtp-data:/var/lib/smtp-console
      - mail-console-data:/var/lib/mail-console
    # loopback only; use gateway for public entry
    ports:
      - "127.0.0.1:${SMTP_PORT:-18430}:18430"

  mail-bridge:
    build:
      context: ./apps/mail-bridge
    image: touch-xai-mail-bridge:local
    container_name: grok-mail-bridge
    restart: unless-stopped
    environment:
      FREEMAIL_BASE: ${FREEMAIL_BASE:-}
      FREEMAIL_API_KEY: ${FREEMAIL_API_KEY:-}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:-}
      CODE_TTL_SEC: ${CODE_TTL_SEC:-1800}
    ports:
      - "127.0.0.1:${MAIL_BRIDGE_PORT:-18431}:18431"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:18431/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Optional overrides so panel can use the bridge without host networking.
  panel:
    environment:
      # only applied when you also set these in .env / config.env
      EMAIL_MODE: ${EMAIL_MODE:-tempmail}
      EMAIL_DOMAIN: ${EMAIL_DOMAIN:-}
      EMAIL_API: ${EMAIL_API:-http://mail-bridge:18431}
      NO_PROXY: 127.0.0.1,localhost,privoxy,flaresolverr,warp-proxy,panel,smtp,mail-bridge,gateway

volumes:
  smtp-data:
  mail-console-data:

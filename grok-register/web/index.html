<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grok Register Panel</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #12161c;
      --panel2: #181d26;
      --border: #273041;
      --text: #e8edf5;
      --muted: #8b97a8;
      --accent: #6ea8fe;
      --good: #3dd68c;
      --warn: #f5a524;
      --bad: #f31260;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      background:
        radial-gradient(1200px 600px at 10% -10%, #1a2740 0%, transparent 55%),
        radial-gradient(900px 500px at 100% 0%, #1a2a22 0%, transparent 50%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 18px 60px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; margin-bottom: 22px; flex-wrap: wrap;
    }
    h1 { font-size: 1.35rem; font-weight: 650; margin: 0; letter-spacing: -0.02em; }
    h1 span { color: var(--muted); font-weight: 500; font-size: 0.9rem; margin-left: 8px; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-radius: 999px;
      background: var(--panel2); border: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .dot.run { background: var(--good); box-shadow: 0 0 10px var(--good); }
    .dot.err { background: var(--bad); }
    .grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 16px; }
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: linear-gradient(180deg, var(--panel) 0%, #0f1319 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 16px 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .card h2 {
      margin: 0 0 12px; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); font-weight: 600;
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    label { font-size: 0.85rem; color: var(--muted); display: block; margin-bottom: 4px; }
    input, select, textarea {
      width: 100%;
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #3d5a80; }
    .field { margin-bottom: 12px; }
    .field.inline { flex: 1; min-width: 120px; }
    button {
      border: 0; border-radius: 10px; padding: 10px 14px;
      font-weight: 600; cursor: pointer; font: inherit;
      transition: transform .05s ease, opacity .15s;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #081018; }
    .btn-danger { background: #3a1520; color: #ffb4c6; border: 1px solid #5c2435; }
    .btn-ghost {
      background: transparent; color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-sm { padding: 7px 10px; font-size: 0.82rem; }
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 8px 0 4px;
    }
    @media (max-width: 600px) { .stats { grid-template-columns: repeat(2, 1fr); } }
    .stat {
      background: var(--panel2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px;
    }
    .stat .k { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: .06em; }
    .stat .v { font-size: 1.25rem; font-weight: 650; margin-top: 4px; font-variant-numeric: tabular-nums; }
    .phase { color: var(--muted); font-size: 0.9rem; margin-top: 8px; min-height: 1.2em; }
    .log {
      font-family: var(--mono); font-size: 12px; line-height: 1.45;
      background: #0a0c10; border: 1px solid var(--border);
      border-radius: 12px; padding: 12px; height: 340px; overflow: auto;
      white-space: pre-wrap; word-break: break-word; color: #c9d4e4;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .05em; }
    .muted { color: var(--muted); }
    .toast {
      position: fixed; right: 16px; bottom: 16px; z-index: 50;
      background: #1c2430; border: 1px solid var(--border);
      padding: 12px 14px; border-radius: 12px; max-width: 360px;
      box-shadow: 0 12px 40px rgba(0,0,0,.4); display: none;
    }
    .toast.show { display: block; }
    .toast.err { border-color: #5c2435; }
    .auth-gate {
      max-width: 400px; margin: 12vh auto; padding: 22px;
    }
    .hidden { display: none !important; }
    .full { grid-column: 1 / -1; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="authGate" class="wrap">
    <div class="card auth-gate">
      <h1>Grok Panel <span>登录</span></h1>
      <p class="muted" style="margin-top:0">输入部署时设置的 <code>PANEL_TOKEN</code>。若服务端未启用鉴权可留空。</p>
      <div class="field">
        <label>Panel Token</label>
        <input id="tokenInput" type="password" placeholder="Bearer token" autocomplete="current-password" />
      </div>
      <div class="row">
        <button class="btn-primary" id="authBtn">进入面板</button>
        <button class="btn-ghost" id="skipAuthBtn">无 token 进入</button>
      </div>
      <p id="authErr" class="phase" style="color:var(--bad)"></p>
    </div>
  </div>

  <div id="app" class="wrap hidden">
    <header>
      <h1>Grok Register <span>控制面板</span></h1>
      <div class="row">
        <div class="badge"><span class="dot" id="statusDot"></span><span id="statusLabel">—</span></div>
        <button class="btn-ghost btn-sm" id="logoutBtn">切换 Token</button>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <h2>控制</h2>
        <div class="row">
          <div class="field inline">
            <label>目标账号数</label>
            <input id="targetInput" type="number" min="1" max="10000" value="10" />
          </div>
        </div>
        <div class="row" style="margin-top:4px">
          <button class="btn-primary" id="startBtn">启动注册</button>
          <button class="btn-danger" id="stopBtn">停止</button>
          <button class="btn-ghost" id="refreshBtn">刷新</button>
        </div>
        <div class="stats">
          <div class="stat"><div class="k">进度</div><div class="v" id="statProgress">0/0</div></div>
          <div class="stat"><div class="k">SSO</div><div class="v" id="statSSO">0</div></div>
          <div class="stat"><div class="k">OAuth</div><div class="v" id="statOAuth">0</div></div>
          <div class="stat"><div class="k">Fail</div><div class="v" id="statFail">0</div></div>
        </div>
        <div class="phase" id="phaseText">—</div>
        <div class="phase muted" id="runMeta"></div>
      </section>

      <section class="card">
        <h2>配置（摘要）</h2>
        <div class="field">
          <label>邮箱模式</label>
          <select id="emailMode">
            <option value="tempmail">tempmail（临时邮箱）</option>
            <option value="custom">custom（自建域名）</option>
          </select>
        </div>
        <div class="field">
          <label>注册代理 REGISTER_PROXY</label>
          <input id="registerProxy" placeholder="http://privoxy:8118" />
        </div>
        <div class="field">
          <label>FlareSolverr URL</label>
          <input id="flareURL" placeholder="http://flaresolverr:8191" />
        </div>
        <div class="row">
          <button class="btn-ghost" id="saveCfgBtn">保存配置</button>
          <button class="btn-ghost" id="reloadCfgBtn">重载</button>
        </div>
        <p class="phase muted">Docker 内请用服务名（privoxy / flaresolverr），不要写 127.0.0.1。</p>
      </section>

      <section class="card full">
        <div class="row" style="justify-content:space-between;margin-bottom:8px">
          <h2 style="margin:0">实时日志</h2>
          <div class="row">
            <button class="btn-ghost btn-sm" id="clearLogBtn">清屏</button>
            <button class="btn-ghost btn-sm" id="pauseLogBtn">暂停跟随</button>
          </div>
        </div>
        <div class="log" id="logView"></div>
      </section>

      <section class="card full">
        <div class="row" style="justify-content:space-between;margin-bottom:8px">
          <h2 style="margin:0">历史 Run / 产物</h2>
          <button class="btn-ghost btn-sm" id="reloadRunsBtn">刷新列表</button>
        </div>
        <div style="overflow:auto">
          <table>
            <thead>
              <tr>
                <th>Run ID</th>
                <th>CPA</th>
                <th>SSO</th>
                <th>时间</th>
                <th>下载</th>
              </tr>
            </thead>
            <tbody id="runsBody">
              <tr><td colspan="5" class="muted">加载中…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
      token: localStorage.getItem('grok_panel_token') || '',
      es: null,
      followPaused: false,
      pollTimer: null,
    };

    function toast(msg, isErr) {
      const el = $('toast');
      el.textContent = msg;
      el.className = 'toast show' + (isErr ? ' err' : '');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 3200);
    }

    function headers(json) {
      const h = {};
      if (json) h['Content-Type'] = 'application/json';
      if (state.token) h['X-Panel-Token'] = state.token;
      return h;
    }

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: { ...headers(!!opts.body), ...(opts.headers || {}) },
      });
      const ct = res.headers.get('content-type') || '';
      let body = null;
      if (ct.includes('application/json')) body = await res.json();
      else body = await res.text();
      if (!res.ok) {
        const err = (body && body.error) || res.statusText || 'request failed';
        const e = new Error(err);
        e.status = res.status;
        e.body = body;
        throw e;
      }
      return body;
    }

    function setRunningUI(running) {
      $('startBtn').disabled = running;
      $('stopBtn').disabled = !running;
    }

    function renderStatus(snap) {
      if (!snap) snap = { status: 'stopped' };
      const running = snap.status === 'running';
      const err = snap.status === 'error';
      const dot = $('statusDot');
      dot.className = 'dot' + (running ? ' run' : err ? ' err' : '');
      $('statusLabel').textContent = running ? '运行中' : err ? '错误' : '空闲';
      $('statProgress').textContent = `${snap.done || 0}/${snap.target || 0}`;
      $('statSSO').textContent = snap.sso_count || 0;
      $('statOAuth').textContent = snap.oauth_count || 0;
      $('statFail').textContent = snap.fail_count || 0;
      $('phaseText').textContent = snap.phase_detail || snap.phase || '—';
      const bits = [];
      if (snap.run_id) bits.push('Run ' + snap.run_id);
      if (snap.pid) bits.push('PID ' + snap.pid);
      if (snap.rate_per_min) bits.push(snap.rate_per_min.toFixed(1) + '/分');
      if (snap.error) bits.push('错误: ' + snap.error);
      $('runMeta').textContent = bits.join(' · ');
      setRunningUI(running);
    }

    async function refreshStatus() {
      try {
        const data = await api('api/status');
        renderStatus(data.status);
      } catch (e) {
        if (e.status === 401) {
          showAuth('Token 无效，请重新输入');
          return;
        }
        $('statusLabel').textContent = '无法连接';
      }
    }

    async function loadConfig() {
      try {
        const data = await api('api/config');
        const c = data.config || {};
        $('emailMode').value = c.email_mode || 'tempmail';
        $('registerProxy').value = c.register_proxy || '';
        $('flareURL').value = c.flaresolverr_url || '';
      } catch (e) {
        /* ignore on first paint */
      }
    }

    async function saveConfig() {
      try {
        await api('api/config', {
          method: 'PUT',
          body: JSON.stringify({
            email_mode: $('emailMode').value,
            register_proxy: $('registerProxy').value,
            flaresolverr_url: $('flareURL').value,
          }),
        });
        toast('配置已保存');
      } catch (e) {
        toast(e.message, true);
      }
    }

    async function startRun() {
      const target = parseInt($('targetInput').value, 10) || 10;
      try {
        const data = await api('api/start', {
          method: 'POST',
          body: JSON.stringify({ target }),
        });
        toast('已启动 run ' + data.run_id);
        connectLogs();
        refreshStatus();
        loadRuns();
      } catch (e) {
        toast(e.message, true);
      }
    }

    async function stopRun() {
      try {
        await api('api/stop', { method: 'POST', body: '{}' });
        toast('已发送停止');
        refreshStatus();
      } catch (e) {
        toast(e.message, true);
      }
    }

    function appendLog(text) {
      const el = $('logView');
      el.textContent += text;
      if (!state.followPaused) el.scrollTop = el.scrollHeight;
      // cap size
      if (el.textContent.length > 400000) {
        el.textContent = el.textContent.slice(-300000);
      }
    }

    function connectLogs() {
      if (state.es) {
        state.es.close();
        state.es = null;
      }
      const q = new URLSearchParams({ follow: '1' });
      if (state.token) q.set('token', state.token);
      const es = new EventSource('api/logs?' + q.toString());
      state.es = es;
      es.onmessage = (ev) => {
        appendLog(ev.data + '\n');
      };
      es.onerror = () => {
        // browser will retry; no toast spam
      };
    }

    async function loadSnapshotLog() {
      try {
        const data = await api('api/logs?tail=200');
        $('logView').textContent = (data.log || '') + ($('logView').textContent ? '' : '');
        if (!state.followPaused) $('logView').scrollTop = $('logView').scrollHeight;
      } catch (_) {}
    }

    async function loadRuns() {
      try {
        const data = await api('api/runs?limit=30');
        const body = $('runsBody');
        const runs = data.runs || [];
        if (!runs.length) {
          body.innerHTML = '<tr><td colspan="5" class="muted">暂无产物</td></tr>';
          return;
        }
        body.innerHTML = runs.map((r) => {
          const tok = state.token ? ('&token=' + encodeURIComponent(state.token)) : '';
          const cpa = `api/runs/${encodeURIComponent(r.id)}/download?kind=cpa${tok}`;
          const all = `api/runs/${encodeURIComponent(r.id)}/download?kind=all${tok}`;
          return `<tr>
            <td><code>${r.id}</code></td>
            <td>${r.cpa_count}</td>
            <td>${r.sso_files}</td>
            <td class="muted">${(r.mod_time || '').replace('T', ' ').replace('Z', ' UTC')}</td>
            <td>
              <a href="${cpa}">CPA.zip</a>
              &nbsp;·&nbsp;
              <a href="${all}">全部</a>
            </td>
          </tr>`;
        }).join('');
      } catch (e) {
        $('runsBody').innerHTML = `<tr><td colspan="5" class="muted">${e.message}</td></tr>`;
      }
    }

    function showAuth(err) {
      $('app').classList.add('hidden');
      $('authGate').classList.remove('hidden');
      if (err) $('authErr').textContent = err;
      if (state.pollTimer) clearInterval(state.pollTimer);
      if (state.es) { state.es.close(); state.es = null; }
    }

    async function enterApp() {
      $('authErr').textContent = '';
      try {
        await api('api/status');
      } catch (e) {
        if (e.status === 401) {
          $('authErr').textContent = 'Token 无效';
          return;
        }
        // if health works but status fails for other reasons, still try
      }
      localStorage.setItem('grok_panel_token', state.token);
      $('authGate').classList.add('hidden');
      $('app').classList.remove('hidden');
      await refreshStatus();
      await loadConfig();
      await loadSnapshotLog();
      connectLogs();
      await loadRuns();
      if (state.pollTimer) clearInterval(state.pollTimer);
      state.pollTimer = setInterval(refreshStatus, 2500);
    }

    $('authBtn').onclick = () => {
      state.token = $('tokenInput').value.trim();
      enterApp();
    };
    $('skipAuthBtn').onclick = () => {
      state.token = '';
      enterApp();
    };
    $('logoutBtn').onclick = () => {
      state.token = '';
      localStorage.removeItem('grok_panel_token');
      showAuth('');
    };
    $('startBtn').onclick = startRun;
    $('stopBtn').onclick = stopRun;
    $('refreshBtn').onclick = () => { refreshStatus(); loadRuns(); };
    $('saveCfgBtn').onclick = saveConfig;
    $('reloadCfgBtn').onclick = loadConfig;
    $('reloadRunsBtn').onclick = loadRuns;
    $('clearLogBtn').onclick = () => { $('logView').textContent = ''; };
    $('pauseLogBtn').onclick = () => {
      state.followPaused = !state.followPaused;
      $('pauseLogBtn').textContent = state.followPaused ? '继续跟随' : '暂停跟随';
    };
    $('tokenInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('authBtn').click();
    });

    // auto enter if token stored or no auth
    (async () => {
      try {
        const h = await fetch('api/health').then((r) => r.json());
        if (!h.auth) {
          state.token = '';
          enterApp();
          return;
        }
        if (state.token) {
          $('tokenInput').value = state.token;
          enterApp();
        }
      } catch (_) {
        /* stay on auth gate */
      }
    })();
  </script>
</body>
</html>
